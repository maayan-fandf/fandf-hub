# Firebase App Hosting config.
# https://firebase.google.com/docs/app-hosting/configure
#
# Sensitive values (*_SECRET, AUTH_GOOGLE_*) come from Google Cloud Secret Manager.
# Non-sensitive values are declared directly as `value:` below.

runConfig:
  minInstances: 0
  maxInstances: 5
  concurrency: 80
  cpu: 1
  memoryMiB: 512

env:
  # ─── Apps Script hub API ─────────────────────────────────────────
  - variable: APPS_SCRIPT_API_URL
    secret: APPS_SCRIPT_API_URL
    availability:
      - BUILD
      - RUNTIME

  - variable: APPS_SCRIPT_API_TOKEN
    secret: APPS_SCRIPT_API_TOKEN
    availability:
      - BUILD
      - RUNTIME

  # ─── NextAuth ────────────────────────────────────────────────────
  - variable: AUTH_SECRET
    secret: AUTH_SECRET
    availability:
      - BUILD
      - RUNTIME

  - variable: AUTH_GOOGLE_ID
    secret: AUTH_GOOGLE_ID
    availability:
      - BUILD
      - RUNTIME

  - variable: AUTH_GOOGLE_SECRET
    secret: AUTH_GOOGLE_SECRET
    availability:
      - BUILD
      - RUNTIME

  - variable: AUTH_TRUST_HOST
    value: "true"
    availability:
      - BUILD
      - RUNTIME

  # Bumps the build-time Node heap so `next build` doesn't OOM. Belt-
  # and-suspenders alongside the pure-helper-extracted-from-driveFolders
  # fix that stopped webpack from chasing googleapis into the client
  # bundle. Default ~4GB ceiling is borderline for our route count even
  # without that mistake; 8GB gives headroom for future growth.
  # Runtime memory is unaffected — runConfig.memoryMiB above is the
  # request-handling ceiling.
  - variable: NODE_OPTIONS
    value: "--max-old-space-size=8192"
    availability:
      - BUILD

  # Explicit canonical URL for NextAuth — Firebase App Hosting's proxy headers
  # don't give NextAuth enough to derive this on its own, so it defaults to
  # the internal 0.0.0.0:8080 container address. Updated to the custom domain
  # once DNS propagated. The old Firebase default URL still works (both map
  # to the same backend) but NextAuth OAuth redirects target this canonical
  # one, which must match an entry in the Google OAuth client's
  # "Authorized redirect URIs".
  - variable: AUTH_URL
    value: https://hub.fandf.co.il
    availability:
      - BUILD
      - RUNTIME

  # ─── Dashboard link ──────────────────────────────────────────────
  - variable: DASHBOARD_URL
    value: https://script.google.com/macros/s/AKfycbz2IQv3mTzd3CfJbwWy78z13dgJBKFl0vvqIX4wPXyqXHnxwVvQ9lt1Sw4m_2lbZrO0Eg/exec
    availability:
      - BUILD
      - RUNTIME

  # ─── Direct Google Workspace access (bypasses Apps Script) ──────
  # Service-account JSON with domain-wide delegation for /auth/tasks
  # + /auth/spreadsheets (as of 2026-04-24). The hub reads + writes
  # Sheets directly via `googleapis`, impersonating the caller's
  # email so access-checks + row-level auth continue to work.
  # GCP Secret Manager IAM: App Hosting runtime SA granted
  # secretAccessor role via `firebase apphosting:secrets:grantaccess`
  # on 2026-04-24. Re-run grantaccess if the backend is ever recreated.
  - variable: TASKS_SA_KEY_JSON
    secret: TASKS_SA_KEY_JSON
    availability:
      - BUILD
      - RUNTIME

  # Main + Comments spreadsheet ids, canonical in code. Kept as env
  # vars (not secrets — they're not secret) so they can be overridden
  # per-environment without a code deploy.
  - variable: SHEET_ID_MAIN
    value: 15GKqEy8OelYtGuuiHYkSAR2xNNL4icwo-Wgiq1suW0Y
    availability:
      - BUILD
      - RUNTIME

  - variable: SHEET_ID_COMMENTS
    value: 1ZpdfJhdYa6aD5iftTsGJuVMLTS9WlzHGZMevq5hrxGU
    availability:
      - BUILD
      - RUNTIME

  # Feature flag: when "1", the tasks read path talks to Sheets directly
  # (fast). When "" or missing, it falls back to the Apps Script proxy
  # (the current default). Start in dev, flip in prod after verifying.
  - variable: USE_SA_TASKS_READS
    value: "1"
    availability:
      - BUILD
      - RUNTIME

  # Separate flag for the write path (create/update tasks). Writes need
  # three additional DWD scopes (drive / calendar / gmail.send) and
  # three extra API enables (Drive / Calendar / Gmail). Keep at "" until
  # those are all in place; flip to "1" after a smoke-test.
  - variable: USE_SA_TASKS_WRITES
    value: "1"
    availability:
      - BUILD
      - RUNTIME

  # Routes getProjectComments / getMyMentions / getProjectTasks through
  # direct Sheets reads (one Sheets API call replaces 3 Apps Script
  # calls on every project page load). Shares the /auth/spreadsheets
  # DWD scope with the tasks-read path — no new scope needed.
  - variable: USE_SA_COMMENTS_READS
    value: "1"
    availability:
      - BUILD
      - RUNTIME

  # Routes getMyProjects (nav dropdown + home + every hub page) through
  # direct Keys-tab reads. Saves ~1 s per page render.
  - variable: USE_SA_PROJECTS_READS
    value: "1"
    availability:
      - BUILD
      - RUNTIME

  # Sheets -> Firestore storage migration (docs/STORAGE_MIGRATION_HANDOFF.md).
  # TWO independent controls. Code treats anything != "1" as OFF, so
  # "0" = off, "1" = on. NOTE: App Hosting rejects an empty-string
  # `value:` ("Invalid apphosting.yaml"), so the off-state MUST be "0",
  # never "". Reuses TASKS_SA_KEY_JSON — no new secret. One-time infra
  # (enable API + Native DB + SA roles/datastore.user + rules/indexes)
  # is DONE.
  #
  # Operational sequence:
  #   1. USE_FIRESTORE_DUALWRITE="1" (reads still Sheets). Every Sheets
  #      write also mirrors to Firestore, best-effort. Soak: run
  #      scripts/parity-check.mjs across a full GT poll cycle until it
  #      stays ALL CLEAN.
  #   2. THEN USE_FIRESTORE_TASKS="1" — reads flip to Firestore,
  #      all-at-once. Rollback = set it back to "0" (reads return to
  #      Sheets instantly; DUALWRITE stays "1" so Firestore stays
  #      current and a re-flip needs no re-backfill).
  - variable: USE_FIRESTORE_DUALWRITE
    value: "1"
    availability:
      - BUILD
      - RUNTIME

  - variable: USE_FIRESTORE_TASKS
    value: "1"
    availability:
      - BUILD
      - RUNTIME

  # Inline-template feature on /tasks/new — when "1", picking a
  # (department, kind) shows a picker of files inside the matching
  # סכמות משימה/<Dept>/<Kind>/ folder; selecting one materializes a
  # per-user draft copy and embeds it as an editable iframe; on
  # submit, the draft folder is re-parented into the task's permanent
  # Drive folder. When "" or missing, /api/worktasks/template-options
  # and /api/worktasks/draft-template return {noTemplate: true} so
  # the picker never renders. See lib/taskTemplates.ts.
  - variable: ENABLE_TASK_TEMPLATES
    value: "1"
    availability:
      - BUILD
      - RUNTIME

  # The email the hub impersonates for Drive folder creation (SA with
  # DWD creates folders in this user's Drive). Default matches the
  # Apps Script behavior (Script was deployed as maayan). Change if
  # you want folders to land in someone else's account.
  - variable: DRIVE_FOLDER_OWNER
    value: maayan@fandf.co.il
    availability:
      - BUILD
      - RUNTIME

  # Shared Drive where task folders live. Hierarchy inside:
  #   <Shared Drive> / <company> / <project> / <campaign> / <task>
  # (campaign level skipped if the task has no campaign set). The
  # impersonated DRIVE_FOLDER_OWNER must have Content Manager role on
  # this Shared Drive for folder creation to succeed.
  - variable: TASKS_SHARED_DRIVE_ID
    value: 0ANtdAz2D4gD_Uk9PVA
    availability:
      - BUILD
      - RUNTIME

  # ─── Clarity + Claude landing-page insights section ──────────────
  # Anthropic API key for the per-project Hebrew narrative on
  # /projects/[name]. Per-project Clarity API tokens themselves are
  # NOT here — they live on the Keys sheet (one workspace per project).
  # GCP Secret Manager IAM: granted via
  # `firebase apphosting:secrets:grantaccess ANTHROPIC_API_KEY --backend fandf-hub`
  # on 2026-05-04. Re-run grantaccess if the backend is ever recreated.
  - variable: ANTHROPIC_API_KEY
    secret: ANTHROPIC_API_KEY
    availability:
      - BUILD
      - RUNTIME

  # ─── Google Drive Picker (new-task page) ──────────────────────────
  # Browser API key for Google's Picker SDK. NEXT_PUBLIC_ prefix is
  # deliberate — Next.js inlines it into client bundles, which is fine
  # because Picker keys are designed to be exposed publicly. Lock it
  # down in GCP Console → Credentials → API key with HTTP-referer
  # restriction to the hub's domain + API restriction to "Google
  # Picker API" only. Without this set, the Picker button on
  # /tasks/new stays disabled (no client crash).
  - variable: NEXT_PUBLIC_GOOGLE_PICKER_API_KEY
    secret: GOOGLE_PICKER_API_KEY
    availability:
      - BUILD
      - RUNTIME
