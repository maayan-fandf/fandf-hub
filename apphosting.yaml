# Firebase App Hosting config.
# https://firebase.google.com/docs/app-hosting/configure
#
# Sensitive values (*_SECRET, AUTH_GOOGLE_*) come from Google Cloud Secret Manager.
# Non-sensitive values are declared directly as `value:` below.

runConfig:
  minInstances: 0
  maxInstances: 5
  # concurrency lowered 80→40 so fewer heavy project-page renders share one
  # instance's RAM at once (each render fetches + builds a large HTML tree).
  concurrency: 40
  cpu: 1
  # 512 MiB OOM-killed the container on heavy project-page renders (Cloud Run
  # logs 2026-07-02: "Memory limit of 512 MiB exceeded" → instance terminated
  # → request fails / page "doesn't load"). 2 GiB gives ~4× headroom.
  memoryMiB: 2048

env:
  # ─── Apps Script hub API ─────────────────────────────────────────
  - variable: APPS_SCRIPT_API_URL
    secret: APPS_SCRIPT_API_URL
    availability:
      - BUILD
      - RUNTIME

  - variable: APPS_SCRIPT_API_TOKEN
    secret: APPS_SCRIPT_API_TOKEN
    availability:
      - BUILD
      - RUNTIME

  # ─── NextAuth ────────────────────────────────────────────────────
  - variable: AUTH_SECRET
    secret: AUTH_SECRET
    availability:
      - BUILD
      - RUNTIME

  - variable: AUTH_GOOGLE_ID
    secret: AUTH_GOOGLE_ID
    availability:
      - BUILD
      - RUNTIME

  - variable: AUTH_GOOGLE_SECRET
    secret: AUTH_GOOGLE_SECRET
    availability:
      - BUILD
      - RUNTIME

  - variable: AUTH_TRUST_HOST
    value: "true"
    availability:
      - BUILD
      - RUNTIME

  # Bumps the build-time Node heap so `next build` doesn't OOM. Belt-
  # and-suspenders alongside the pure-helper-extracted-from-driveFolders
  # fix that stopped webpack from chasing googleapis into the client
  # bundle. Default ~4GB ceiling is borderline for our route count even
  # without that mistake; 8GB gives headroom for future growth.
  # Runtime memory is unaffected — runConfig.memoryMiB above is the
  # request-handling ceiling.
  - variable: NODE_OPTIONS
    value: "--max-old-space-size=8192"
    availability:
      - BUILD

  # Explicit canonical URL for NextAuth — Firebase App Hosting's proxy headers
  # don't give NextAuth enough to derive this on its own, so it defaults to
  # the internal 0.0.0.0:8080 container address. Updated to the custom domain
  # once DNS propagated. The old Firebase default URL still works (both map
  # to the same backend) but NextAuth OAuth redirects target this canonical
  # one, which must match an entry in the Google OAuth client's
  # "Authorized redirect URIs".
  - variable: AUTH_URL
    value: https://hub.fandf.co.il
    availability:
      - BUILD
      - RUNTIME

  # ─── Dashboard link ──────────────────────────────────────────────
  - variable: DASHBOARD_URL
    value: https://script.google.com/macros/s/AKfycbz2IQv3mTzd3CfJbwWy78z13dgJBKFl0vvqIX4wPXyqXHnxwVvQ9lt1Sw4m_2lbZrO0Eg/exec
    availability:
      - BUILD
      - RUNTIME

  # ─── Direct Google Workspace access (bypasses Apps Script) ──────
  # Service-account JSON with domain-wide delegation for /auth/tasks
  # + /auth/spreadsheets (as of 2026-04-24). The hub reads + writes
  # Sheets directly via `googleapis`, impersonating the caller's
  # email so access-checks + row-level auth continue to work.
  # GCP Secret Manager IAM: App Hosting runtime SA granted
  # secretAccessor role via `firebase apphosting:secrets:grantaccess`
  # on 2026-04-24. Re-run grantaccess if the backend is ever recreated.
  - variable: TASKS_SA_KEY_JSON
    secret: TASKS_SA_KEY_JSON
    availability:
      - BUILD
      - RUNTIME

  # Main + Comments spreadsheet ids, canonical in code. Kept as env
  # vars (not secrets — they're not secret) so they can be overridden
  # per-environment without a code deploy.
  - variable: SHEET_ID_MAIN
    value: 15GKqEy8OelYtGuuiHYkSAR2xNNL4icwo-Wgiq1suW0Y
    availability:
      - BUILD
      - RUNTIME

  - variable: SHEET_ID_COMMENTS
    value: 1ZpdfJhdYa6aD5iftTsGJuVMLTS9WlzHGZMevq5hrxGU
    availability:
      - BUILD
      - RUNTIME

  # Creatives spreadsheet (Supermetrics-fed) — source of the actual
  # per-campaign daily budgets (fb-campaigns / קמפיין ID גוגל) shown on
  # the budget desk, same file the Apps Script dashboard reads.
  - variable: SHEET_ID_CREATIVES
    value: 1q-WFtFLDnltznwYKax2yZ1O-q_VToULWN8-sn-8xXuA
    availability:
      - BUILD
      - RUNTIME

  # Standardized platform-daily spend file (ILS-normalized; tabs GADS2 /
  # FB / Taboola2 / OB2). Source of the budget desk's 7-day actual-spend
  # average for the pacing diagnosis — same file the dashboard reads.
  - variable: SHEET_ID_PLATFORM_DAILY
    value: 1lv95d5kq62WjvDR5ykDrIgdcqxOj3pHrDzEYsaUsfWQ
    availability:
      - BUILD
      - RUNTIME

  # BMBY warehouse (Supabase) — CRM-funnel enrichment (authoritative held
  # meetings etc.). SUPABASE_SERVICE_ROLE_KEY is a SERVER-ONLY secret — it
  # never reaches the browser (lib/supabase.ts is server-only; build-verified).
  # Stopgap; swap to a scoped read-only key later via SUPABASE_CRM_KEY.
  - variable: SUPABASE_SERVICE_ROLE_KEY
    secret: SUPABASE_SERVICE_ROLE_KEY
    availability:
      - RUNTIME

  - variable: SUPABASE_URL
    value: https://zkuzyxrkqjtramucjhid.supabase.co/rest/v1/
    availability:
      - RUNTIME

  # Master on/off for the CRM enrichment.
  - variable: SUPABASE_CRM_ENRICHMENT
    value: "1"
    availability:
      - RUNTIME

  # Separate rollout flag for the Sehel warehouse funnel (sehel_leads_daily /
  # sehel_touches / sehel_meetings). Flipped to "1" 2026-07-13 after the
  # warehouse cross-check: leads are healthy portfolio-wide and the funnel is
  # sound where meetings exist (CAZAR / אפרידר / HaGada / ברוריה). The routing
  # guard in lib/crmData only lets the warehouse supersede when it actually
  # carries meetings, so projects still missing from sehel_meetings (כוכב הצפון
  # אשדוד / תדהר / רייסדור / קיימא — see SEHEL_MEETINGS_SYNC_GAP.md) stay on the
  # Sheet with no regression until Nadav backfills them.
  - variable: SUPABASE_SEHEL_WAREHOUSE
    value: "1"
    availability:
      - RUNTIME

  # Canary allowlist (SUPABASE_CRM_PROJECTS) — when SET, enrichment +
  # warehouse-funnel run ONLY for those Keys.CRM names; when UNSET (this
  # variable omitted) = ALL bmby projects, with the wh>=sheet routing guard
  # deciding per project (incomplete-feed projects stay on the Sheet).
  # 2026-06-15: REMOVED to go portfolio-wide after the kenko/נתיבות canary.
  # ⚠️ App Hosting rejects `value: ""` ("either 'value' or 'secret' is
  # required") — so to RE-NARROW, re-add the variable with a BASE64 value
  # (the env pipeline mangles non-ASCII Hebrew):
  #   - variable: SUPABASE_CRM_PROJECTS
  #     value: "<base64>"   # node -e "console.log(Buffer.from('נתיבות,רעננה קנקו').toString('base64'))"
  #     availability: [RUNTIME]

  # Kill-switch for the קמפיינים → תקציבים inline budget editor. When "1"
  # the /api/campaigns/budget route may write column G (תקציב חודשי
  # מאושר) on project tabs of SHEET_ID_MAIN. Flip to "" to instantly
  # disable all budget writes (reads/UI keep working).
  - variable: USE_BUDGET_WRITES
    value: "1"
    availability:
      - BUILD
      - RUNTIME

  # Feature flag: when "1", the tasks read path talks to Sheets directly
  # (fast). When "" or missing, it falls back to the Apps Script proxy
  # (the current default). Start in dev, flip in prod after verifying.
  - variable: USE_SA_TASKS_READS
    value: "1"
    availability:
      - BUILD
      - RUNTIME

  # Separate flag for the write path (create/update tasks). Writes need
  # three additional DWD scopes (drive / calendar / gmail.send) and
  # three extra API enables (Drive / Calendar / Gmail). Keep at "" until
  # those are all in place; flip to "1" after a smoke-test.
  - variable: USE_SA_TASKS_WRITES
    value: "1"
    availability:
      - BUILD
      - RUNTIME

  # Routes getProjectComments / getMyMentions / getProjectTasks through
  # direct Sheets reads (one Sheets API call replaces 3 Apps Script
  # calls on every project page load). Shares the /auth/spreadsheets
  # DWD scope with the tasks-read path — no new scope needed.
  - variable: USE_SA_COMMENTS_READS
    value: "1"
    availability:
      - BUILD
      - RUNTIME

  # Routes getMyProjects (nav dropdown + home + every hub page) through
  # direct Keys-tab reads. Saves ~1 s per page render.
  - variable: USE_SA_PROJECTS_READS
    value: "1"
    availability:
      - BUILD
      - RUNTIME

  # Sheets -> Firestore storage migration (docs/STORAGE_MIGRATION_HANDOFF.md).
  # TWO independent controls. Code treats anything != "1" as OFF, so
  # "0" = off, "1" = on. NOTE: App Hosting rejects an empty-string
  # `value:` ("Invalid apphosting.yaml"), so the off-state MUST be "0",
  # never "". Reuses TASKS_SA_KEY_JSON — no new secret. One-time infra
  # (enable API + Native DB + SA roles/datastore.user + rules/indexes)
  # is DONE.
  #
  # Operational sequence:
  #   1. USE_FIRESTORE_DUALWRITE="1" (reads still Sheets). Every Sheets
  #      write also mirrors to Firestore, best-effort. Soak: run
  #      scripts/parity-check.mjs across a full GT poll cycle until it
  #      stays ALL CLEAN.
  #   2. THEN USE_FIRESTORE_TASKS="1" — reads flip to Firestore,
  #      all-at-once. Rollback = set it back to "0" (reads return to
  #      Sheets instantly; DUALWRITE stays "1" so Firestore stays
  #      current and a re-flip needs no re-backfill).
  #
  # Phase 4 ACTIVATED 2026-05-18 → DUALWRITE set to "0" in the SAME
  # rollout as USE_FIRESTORE_WRITES="1" (atomic — no window with
  # dual-write off while writes is still off, which would break
  # Phase-3 rollback). With Sheets no longer written the mirror is
  # dead weight; the !fsWrites guards make Phase 4 correct either way,
  # but off is the clean end state. Was "1" through Phase 3.
  - variable: USE_FIRESTORE_DUALWRITE
    value: "0"
    availability:
      - BUILD
      - RUNTIME

  - variable: USE_FIRESTORE_TASKS
    value: "1"
    availability:
      - BUILD
      - RUNTIME

  # Phase 4 — Firestore = SOURCE OF TRUTH (writes go Firestore-first,
  # transactional; Sheets writes for moved data STOP). IRREVERSIBLE
  # once "1" (Sheets goes stale — there is no lossless rollback past
  # this point). ACTIVATED 2026-05-18 with explicit owner go-ahead:
  # ALL write paths are branched + tsc-clean + pushed (handoff §10 —
  # the §10 list: tasksCreateDirect, commentsWriteDirect ×5,
  # pricingLog ×2, dependencyCascade, umbrellaRecompute, pollTasks;
  # PLUS 4 discovered siblings: migrateCommentThreadDirect,
  # appendChainStep.updateTailBlocksCell, campaigns/rename route,
  # taskUpload.findTaskFolderInfo; PLUS the tasksUpdateDirect
  # post-write-mirror guard `023a440`). DUALWRITE flips to "0" in the
  # same rollout (above).
  - variable: USE_FIRESTORE_WRITES
    value: "1"
    availability:
      - BUILD
      - RUNTIME

  # Master gate for restricted/roster-synced Chat spaces. When "1":
  #  (a) new project spaces are created RESTRICTED (no org-wide
  #      discoverability) + the Keys roster is invited;
  #  (b) /api/cron/sync-chat-spaces continuously reconciles EVERY
  #      space's membership to its Keys roster (roster-ONLY: cols
  #      C/D/J/K @fandf; admins only if rostered) — adds + removes,
  #      with hard mass-removal rails (lib/chatSpaceSync.ts).
  # Default "0" = current behavior (discoverable to all of F&F, no
  # invite, cron is a no-op). PREREQUISITE before "1": the
  # chat.memberships DWD scope MUST be granted (Workspace Admin → DWD
  # client 102907403320696302169) — with the flag on but the scope
  # missing, new spaces are created restricted-but-EMPTY and the cron
  # aborts. The default-off gate is the safety mechanism: confirm the
  # scope, then flip. Existing already-discoverable spaces also need a
  # one-time access tightening (separate spaces.patch scope) — see
  # docs/CHAT_SPACE_MEMBERSHIP_CLEANUP.md. Empty `value:` is rejected
  # by the App Hosting preparer — keep it "1"/"0", never "".
  #
  # ENABLED 2026-05-18 (owner granted chat.memberships scope + created
  # the Cloud Scheduler job). Reversible: set back to "0" to revert
  # (no irreversible effect). The cron still mutates NOTHING because
  # CHAT_SPACE_SYNC_DRYRUN defaults to "1" — going live is the separate
  # second flip of that flag after the dry-run plan is reviewed.
  - variable: USE_RESTRICTED_CHAT_SPACES
    value: "1"
    availability:
      - BUILD
      - RUNTIME

  # Safety valve for the membership-reconcile cron. DEFAULT dry-run ON
  # (anything other than exactly "0" = dry-run). While on, the cron
  # reads Keys + lists each space's members (so a missing
  # chat.memberships scope still surfaces) and LOGS the exact per-space
  # add/remove plan, but mutates NOTHING. Going live = a deliberate
  # second flip to "0", only after the dry-run plan in the cron logs
  # has been reviewed. Enabling USE_RESTRICTED_CHAT_SPACES alone can
  # therefore never mass-remove anyone.
  #
  # LIVE 2026-05-18: dry-run plan reviewed with owner (24 spaces,
  # +13 adds / -42 removes = shir/nadav/sapir off non-rostered
  # spaces); owner explicitly chose strict roster-only. Flipped "0" →
  # the cron now applies adds/removes (safety rails still on). Set
  # back to "1" to halt further mutations.
  - variable: CHAT_SPACE_SYNC_DRYRUN
    value: "0"
    availability:
      - BUILD
      - RUNTIME

  # Path B (owner decision 2026-05-18): the team works in
  # WhatsApp/email, not Google Chat — the hub's automated
  # cross-stream mirror (postChatWebhook: comment/reply/resolve/
  # mention → Chat space) is not worth its noise, and the hub's
  # discussion is stored in Firestore (Chat was only ever a mirror,
  # so nothing is lost). DEFAULT "0" = the hub never auto-posts into
  # Chat spaces. Flag-gated (code kept) so it's revivable if the team
  # ever moves into Chat — set "1" to re-enable. Does NOT touch the
  # two explicit user-initiated posts (customer-email share-to-chat,
  # in-hub discussion-tab send) or the roster-sync cron. Empty
  # `value:` is rejected by the preparer — keep "0", never "".
  - variable: CHAT_CROSSPOST_ENABLED
    value: "0"
    availability:
      - BUILD
      - RUNTIME

  # When "1", new project Chat spaces are created THREADED
  # (spaceThreadingState: THREADED_MESSAGES) so the default per-member
  # notification is "@mentions + followed threads only" — members
  # added to a space are NOT pinged on every message, only when
  # actually @mentioned. Independent of USE_RESTRICTED_CHAT_SPACES
  # (different lever; only needs the chat.spaces.create scope already
  # in use — no chat.memberships prerequisite). Default "0". CAVEATS:
  # forward-only (threading is immutable post-create — does NOT touch
  # existing spaces) and MUST be verified live that API-created spaces
  # actually come out threaded (the field may be output-only /
  # org-policy-controlled). The fix that also covers EXISTING spaces
  # is the Google Workspace Admin org-wide Chat notification default
  # (not code). Empty `value:` is rejected by the preparer — keep "0".
  # ENABLED 2026-05-18: new project spaces are created THREADED so
  # members default to "@mentions + followed threads only" (no
  # per-message ping). Independent flag, no chat.memberships prereq;
  # worst case the API ignores the field (no regression). VERIFY on the
  # next real space creation that it actually comes out threaded.
  - variable: USE_THREADED_CHAT_SPACES
    value: "1"
    availability:
      - BUILD
      - RUNTIME

  # Inline-template feature on /tasks/new — when "1", picking a
  # (department, kind) shows a picker of files inside the matching
  # סכמות משימה/<Dept>/<Kind>/ folder; selecting one materializes a
  # per-user draft copy and embeds it as an editable iframe; on
  # submit, the draft folder is re-parented into the task's permanent
  # Drive folder. When "" or missing, /api/worktasks/template-options
  # and /api/worktasks/draft-template return {noTemplate: true} so
  # the picker never renders. See lib/taskTemplates.ts.
  - variable: ENABLE_TASK_TEMPLATES
    value: "1"
    availability:
      - BUILD
      - RUNTIME

  # The email the hub impersonates for Drive folder creation (SA with
  # DWD creates folders in this user's Drive). Default matches the
  # Apps Script behavior (Script was deployed as maayan). Change if
  # you want folders to land in someone else's account.
  - variable: DRIVE_FOLDER_OWNER
    value: maayan@fandf.co.il
    availability:
      - BUILD
      - RUNTIME

  # Shared Drive where task folders live. Hierarchy inside:
  #   <Shared Drive> / <company> / <project> / <campaign> / <task>
  # (campaign level skipped if the task has no campaign set). The
  # impersonated DRIVE_FOLDER_OWNER must have Content Manager role on
  # this Shared Drive for folder creation to succeed.
  - variable: TASKS_SHARED_DRIVE_ID
    value: 0ANtdAz2D4gD_Uk9PVA
    availability:
      - BUILD
      - RUNTIME

  # Drive folder ("profile images") holding the curated team avatars,
  # one image per person named by email local-part (maayan.png ↔
  # maayan@fandf.co.il). Primary avatar source via /api/avatar/<email>
  # (lib/driveAvatars.ts); falls back to the Workspace profile photo.
  # Must be readable by the impersonated DRIVE_FOLDER_OWNER. Change this
  # to point the whole site at a different avatar folder.
  - variable: AVATARS_FOLDER_ID
    value: 1K1f9toK7kwL_t1sCDruEIbn9Wm4En27p
    availability:
      - BUILD
      - RUNTIME

  # ─── Clarity + Claude landing-page insights section ──────────────
  # Anthropic API key for the per-project Hebrew narrative on
  # /projects/[name]. Per-project Clarity API tokens themselves are
  # NOT here — they live on the Keys sheet (one workspace per project).
  # GCP Secret Manager IAM: granted via
  # `firebase apphosting:secrets:grantaccess ANTHROPIC_API_KEY --backend fandf-hub`
  # on 2026-05-04. Re-run grantaccess if the backend is ever recreated.
  - variable: ANTHROPIC_API_KEY
    secret: ANTHROPIC_API_KEY
    availability:
      - BUILD
      - RUNTIME

  # ─── Google Drive Picker (new-task page) ──────────────────────────
  # Browser API key for Google's Picker SDK. NEXT_PUBLIC_ prefix is
  # deliberate — Next.js inlines it into client bundles, which is fine
  # because Picker keys are designed to be exposed publicly. Lock it
  # down in GCP Console → Credentials → API key with HTTP-referer
  # restriction to the hub's domain + API restriction to "Google
  # Picker API" only. Without this set, the Picker button on
  # /tasks/new stays disabled (no client crash).
  - variable: NEXT_PUBLIC_GOOGLE_PICKER_API_KEY
    secret: GOOGLE_PICKER_API_KEY
    availability:
      - BUILD
      - RUNTIME

  # ─── Web Push (background browser notifications) — ACTIVE ─────────
  # Activated 2026-05-25. Rollouts referencing VAPID_PRIVATE_KEY had been
  # fast-failing at the preparer with "Error resolving secret version
  # …/versions/latest" even though the secret existed (v1, enabled,
  # automatic replication) and 3 SAs held secretAccessor (granted via raw
  # gcloud). The fix was NOT another IAM grant — it was running, from the
  # OWNER's shell (firebase-tools installed there via `npm i -g`):
  #   firebase apphosting:secrets:grantaccess VAPID_PRIVATE_KEY --backend fandf-hub --project fandf-dashboard
  # which reported "Successfully set IAM bindings on secret
  # VAPID_PRIVATE_KEY" — i.e. the firebase CLI writes the backend↔secret
  # binding/association that the raw gcloud grants missed. If the backend
  # is ever recreated, re-run that grantaccess.
  # The NEXT_PUBLIC_ public key is safe to expose (client-side VAPID key).
  # The private key stays in Secret Manager and is read LAZILY at RUNTIME
  # only (lib/webPush.ts vapid()/ensureVapid(), when signing a push), so
  # RUNTIME availability is enough — the build never needs it.
  - variable: NEXT_PUBLIC_VAPID_PUBLIC_KEY
    value: BDFIsy8aowEYA-A95a7VyWwrwIZdqm4RTOAKtidb5PVLKt8HRKlveh4Qa8HwmUZWIVb-B0x-Fx6-JduCXOXI_Vc
    availability:
      - BUILD
      - RUNTIME
  - variable: VAPID_SUBJECT
    value: mailto:maayan@fandf.co.il
    availability:
      - BUILD
      - RUNTIME
  - variable: VAPID_PRIVATE_KEY
    secret: VAPID_PRIVATE_KEY
    availability:
      - RUNTIME
